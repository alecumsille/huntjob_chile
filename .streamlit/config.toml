# HuntJob Chile — tema pastel
# Rosado (contenido principal, botones) + celeste (sidebar, links, code),
# ambos como tintes suaves sobre fondo casi blanco.

[theme]
base = "light"
primaryColor = "#C87FA0"
backgroundColor = "#FFFDFE"
secondaryBackgroundColor = "#FCEEF3"
codeBackgroundColor = "#EDF4FB"
textColor = "#3A3642"
linkColor = "#5B9BD5"
borderColor = "#F3D9E3"
showWidgetBorder = true
showSidebarBorder = true
baseRadius = "12px"
buttonRadius = "12px"
font = "Nunito:https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap"
headingFont = "Quicksand:https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap"
codeFont = "'JetBrains Mono':https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap"
codeFontSize = "0.875rem"
codeTextColor = "#33394A"
baseFontSize = 15
baseFontWeight = 400
headingFontSizes = ["34px", "28px", "22px", "18px", "16px", "14px"]
headingFontWeights = [600, 600, 600, 600, 600, 600]
linkUnderline = false
chartCategoricalColors = ["#E8A0BE", "#8FBCE6", "#B39DDB", "#8ED1B0", "#F5B895", "#EAD57C", "#A8C99A"]

# paleta pastel: rosado + celeste + acentos suaves
grayColor = "#A39BAE"
blueColor = "#7FB3E0"
greenColor = "#7FC9A0"
redColor = "#E8919B"
yellowColor = "#EAD57C"
orangeColor = "#F0B285"
violetColor = "#B39DDB"

dataframeBorderColor = "#F3D9E3"
dataframeHeaderBackgroundColor = "#FCEEF3"

[theme.sidebar]
backgroundColor = "#EFF6FC"
secondaryBackgroundColor = "#E4EFF9"
codeBackgroundColor = "#E4EFF9"
textColor = "#3A3642"
borderColor = "#D6E7F5"
primaryColor = "#5B9BD5"
dataframeHeaderBackgroundColor = "#E4EFF9"
dataframeBorderColor = "#D6E7F5"
